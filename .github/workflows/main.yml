name: RDP

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download ngrok
        shell: powershell
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .
          dir

      - name: Setup ngrok
        shell: powershell
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN

      - name: Enable RDP
        shell: powershell
        run: |
          net user kamel123 MyStrong123 /add
          net localgroup administrators kamel123 /add

          Set-ItemProperty `
          -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" `
          -Name "fDenyTSConnections" `
          -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Start ngrok tunnel
        shell: powershell
        run: |
          Start-Process -NoNewWindow .\ngrok.exe -ArgumentList "tcp 3389"

          Start-Sleep -Seconds 5

          Write-Host "Ngrok Tunnel:"
          Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
